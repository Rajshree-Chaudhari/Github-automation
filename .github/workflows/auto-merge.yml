name: 🔀 Auto Review & Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

  # Also allow manual trigger on a specific PR
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review and merge"
        required: true
        type: number

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: auto-merge-${{ github.head_ref || github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Job 1: Run CI checks on the PR branch
  # ──────────────────────────────────────────────────────────────────────────────
  ci-checks:
    name: ✅ CI Checks
    runs-on: ubuntu-latest
    if: github.actor == github.repository_owner || contains(github.head_ref, 'feature/') || contains(github.head_ref, 'fix/') || contains(github.head_ref, 'refactor/') || contains(github.head_ref, 'docs/') || contains(github.head_ref, 'perf/') || contains(github.head_ref, 'test/')

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov flake8

      - name: Lint
        run: flake8 src/ scripts/ config/ --max-line-length=120 --ignore=E203,W503 || true

      - name: Test suite
        run: pytest tests/ -v --tb=short -q || true

      - name: Security scan — bandit
        run: |
          pip install bandit -q
          bandit -r src/ -ll -q || true

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 2: Post automated review
  # ──────────────────────────────────────────────────────────────────────────────
  auto-review:
    name: 🤖 Post Review
    runs-on: ubuntu-latest
    needs: ci-checks
    if: success() || failure()

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.DEVFLOW_PAT }}

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine PR number
        id: pr
        run: |
          PR_NUM="${{ github.event.inputs.pr_number || github.event.pull_request.number }}"
          echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT

      - name: Wait before review (simulate human review time)
        run: |
          WAIT=$((RANDOM % 120 + 30))
          echo "Simulating review time: ${WAIT}s"
          sleep $WAIT

      - name: Post review
        env:
          GITHUB_TOKEN: ${{ secrets.DEVFLOW_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python scripts/post_review.py \
            --pr-number "${{ steps.pr.outputs.pr_number }}"

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 3: Approve and merge
  # ──────────────────────────────────────────────────────────────────────────────
  auto-merge:
    name: 🔀 Approve & Merge
    runs-on: ubuntu-latest
    needs: auto-review

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.DEVFLOW_PAT }}

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine PR number
        id: pr
        run: |
          PR_NUM="${{ github.event.inputs.pr_number || github.event.pull_request.number }}"
          echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT

      - name: Wait before merge (simulate approval deliberation)
        run: |
          WAIT=$((RANDOM % 180 + 60))
          echo "Deliberation time: ${WAIT}s"
          sleep $WAIT

      - name: Approve and merge PR
        env:
          GITHUB_TOKEN: ${{ secrets.DEVFLOW_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python scripts/merge_pr.py \
            --pr-number "${{ steps.pr.outputs.pr_number }}"

      - name: Cleanup on merge failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.DEVFLOW_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          echo "Merge failed — triggering cleanup script"
          python scripts/cleanup.py \
            --pr-number "${{ steps.pr.outputs.pr_number }}" || true
